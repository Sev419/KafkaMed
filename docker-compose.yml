name: kafkamed
services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: kafkamed-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INSIDE://:9092,OUTSIDE://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD", "bash", "-ec", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 25s

  mongo:
    image: mongo:7
    container_name: kafkamed-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  spark-heart-stream:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: kafkamed-spark-heart-stream
    profiles:
      - processing
    env_file:
      - .env.example
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: heart-records
      SPARK_CHECKPOINT_LOCATION: /app/data/streaming/checkpoints/heart-records
      SPARK_STARTING_OFFSETS: earliest
      SPARK_JARS_PACKAGES: org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1
      STREAM_TRIGGER_MODE: availableNow
      STREAM_TIMEOUT_SECONDS: "120"
      SPARK_MASTER: local[1]
      SPARK_SHUFFLE_PARTITIONS: "1"
      SPARK_DEFAULT_PARALLELISM: "1"
      SPARK_UI_ENABLED: "false"
      SPARK_DRIVER_BIND_ADDRESS: 127.0.0.1
      SPARK_DRIVER_HOST: 127.0.0.1
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      kafka:
        condition: service_started
    command: >
      sh -c "python spark_processing/jobs/process_heart_records_stream.py"

  spark-heart-mongo:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: kafkamed-spark-heart-mongo
    profiles:
      - processing
    env_file:
      - .env.example
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: heart-records
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: kafkamed_db
      MONGO_COLLECTION: heart_records
      SPARK_CHECKPOINT_LOCATION: /tmp/kafkamed/checkpoints/heart-records-mongo
      SPARK_STARTING_OFFSETS: earliest
      SPARK_JARS_PACKAGES: org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1
      STREAM_TRIGGER_MODE: availableNow
      STREAM_TIMEOUT_SECONDS: "120"
      SPARK_MASTER: local[1]
      SPARK_SHUFFLE_PARTITIONS: "1"
      SPARK_DEFAULT_PARALLELISM: "1"
      SPARK_UI_ENABLED: "false"
      SPARK_DRIVER_BIND_ADDRESS: 127.0.0.1
      SPARK_DRIVER_HOST: 127.0.0.1
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      kafka:
        condition: service_started
      mongo:
        condition: service_healthy
    command: >
      sh -c "python spark_processing/jobs/process_heart_records_to_mongo.py"

  spark-heart-ml-mongo:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: kafkamed-spark-heart-ml-mongo
    profiles:
      - processing
    env_file:
      - .env.example
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: heart-records
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: kafkamed_db
      MONGO_COLLECTION: heart_predictions
      MONGO_PREDICTIONS_COLLECTION: heart_predictions
      MODEL_PATH: ml/models/heart_risk_model.joblib
      MODEL_VERSION: logistic_regression_complete_dataset_v1
      SPARK_CHECKPOINT_LOCATION: /tmp/kafkamed/checkpoints/heart-predictions
      SPARK_STARTING_OFFSETS: earliest
      SPARK_JARS_PACKAGES: org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.1
      STREAM_TRIGGER_MODE: availableNow
      STREAM_TIMEOUT_SECONDS: "120"
      SPARK_MASTER: local[1]
      SPARK_SHUFFLE_PARTITIONS: "1"
      SPARK_DEFAULT_PARALLELISM: "1"
      SPARK_UI_ENABLED: "false"
      SPARK_DRIVER_BIND_ADDRESS: 127.0.0.1
      SPARK_DRIVER_HOST: 127.0.0.1
    working_dir: /app
    volumes:
      - ./:/app
    depends_on:
      kafka:
        condition: service_started
      mongo:
        condition: service_healthy
    command: >
      sh -c "python spark_processing/jobs/process_heart_records_with_ml_to_mongo.py"

volumes:
  mongo_data:
